<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script type="module" src="js/app.js"></script>
</head>

<body>

    <div class="form-container">

        <div class="form-child">

            <h1>My Task 1</h1>
            <p>This page provides a simple login form.</p>

            <form id="myForm">

                <input
                    type="email"
                    id="iuser"
                    name="iuser"
                    placeholder="User Name"
                    maxlength="40">

                <input
                    type="password"
                    id="ipassword"
                    name="ipassword"
                    placeholder="Password"
                    maxlength="10"
                    minlength="3">

                <span id="error" class="form-error"></span>

                <div class="button-group">
                    <button
                        type="reset"
                        id="ireset"
                        class="form-reset">
                        Reset
                    </button>

                    <button
                        type="submit"
                        id="isubmit"
                        class="form-submit">
                        Submit
                    </button>
                </div>

            </form>

        </div>

    </div>

    <!-- Success Alert -->

    <div
        id="successAlert"
        class="alert alert-success position-fixed top-50 start-50 translate-middle d-none"
        role="alert"
        style="z-index:9999; min-width:300px; text-align:center;">

        <strong>Success!</strong><br>
        Login Successful

    </div>

</body>

</html>
